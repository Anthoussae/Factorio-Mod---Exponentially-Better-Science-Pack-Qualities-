[mod-name]
exponentially-better-science-pack-qualities=Exponentially Better Science Pack Qualities

[mod-description]
exponentially-better-science-pack-qualities=Replaces vanilla linear quality durability scaling with configurable exponential scaling (factor^level). Affects science packs, repair packs, and armor. Requires the Quality feature. Replaces vanilla linear quality durability scaling with configurable exponential scaling for science packs and other tools, making higher quality science much more viable. Recommended setting is 2, making rare science 400% more durable, epic science 800%, and legendary science 3200% more durable. Improves spoil time of agricultural science packs. Also affects repair packs and some other minor durability based items.

[mod-setting-name]
exponentially-better-science-pack-qualities-quality-durability-scaling-factor=Quality durability scaling factor

[mod-setting-description]
exponentially-better-science-pack-qualities-quality-durability-scaling-factor=Each quality tier multiplies tool durability by this factor raised to the quality level (factor^level). Default Quality levels are normal-1, uncommon-2, rare-3, epic-4, and legendary-6. For vanilla scaling settings leave this value at 1. Recommended default: 2. (normal: 100%, uncommon: 200%, rare: 400%, epic: 800%, legendary: 3200%)
