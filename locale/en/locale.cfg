[mod-name]
jsl-quality-science-durability=JSL Quality Science Durability

[mod-description]
jsl-quality-science-durability=Replaces vanilla linear quality durability scaling with configurable exponential scaling (factor^level). Affects science packs, repair packs, and armor. Requires the Quality feature.

[mod-setting-name]
jsl-quality-science-durability-quality-durability-scaling-factor=Quality durability scaling factor

[mod-setting-description]
jsl-quality-science-durability-quality-durability-scaling-factor=Each quality tier multiplies tool durability by this factor raised to the quality level (factor^level). Vanilla uses a linear +1 per level, equivalent to setting this to 1. Default: 3.
